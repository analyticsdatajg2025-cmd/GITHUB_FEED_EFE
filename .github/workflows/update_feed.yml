name: Actualizar Feed y Generar Imagenes

on:
  schedule:
    # Horas exactas para Perú (UTC-5): 02,05,08,11,14,17,20,23 UTC
    - cron: '7 2,5,8,11,14,17,20,23 * * *'
  
  # Este disparador es clave para probar y resetear el reloj
  push:
    branches: [ "main" ]
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests Pillow gspread oauth2client tqdm

      - name: Ejecutar Script por Lotes
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git pull origin main || true
          python main.py