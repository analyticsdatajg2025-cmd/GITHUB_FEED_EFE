name: Feed EFE -> Imagenes (paralelo)

on:
  schedule:
    # Horas Perú (UTC-5): 02,05,08,11,14,17,20,23
    - cron: '7 2,5,8,11,14,17,20,23 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Regenerar TODAS las imagenes (ignora cache)'
        type: boolean
        default: false

permissions:
  contents: write

# Evita que dos corridas se pisen (importante con schedule + push)
concurrency:
  group: feed-efe
  cancel-in-progress: false

env:
  SHARDS: 12            # numero de maquinas en paralelo (Free permite hasta 20 jobs)
  PYTHON_VERSION: '3.10'

jobs:
  # ---------- FASE 1: preparar feed ----------
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: assets
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests Pillow
      - name: Descargar y purificar feed
        run: python main.py prepare
      - uses: actions/upload-artifact@v4
        with:
          name: feed-clean
          path: feed_clean.csv
          retention-days: 1
      - id: mk
        name: Construir matriz de shards
        run: |
          arr=$(python -c "import os,json;print(json.dumps(list(range(int(os.environ['SHARDS'])))))")
          echo "matrix=$arr" >> "$GITHUB_OUTPUT"

  # ---------- FASE 2: generar imagenes en paralelo ----------
  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4   # SIN images/ -> usa el manifest, checkout liviano
        with:
          sparse-checkout: assets
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests Pillow
      - uses: actions/download-artifact@v4
        with:
          name: feed-clean
      - name: Generar imagenes (shard ${{ matrix.shard }})
        run: |
          python main.py build \
            --shard ${{ matrix.shard }} \
            --shards ${{ env.SHARDS }} \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.force_rebuild) && '--force' || '' }}
      - name: Subir imagenes nuevas
        uses: actions/upload-artifact@v4
        with:
          name: new-${{ matrix.shard }}
          path: staging_new/
          if-no-files-found: ignore
          retention-days: 1
      - name: Subir CSV valido
        uses: actions/upload-artifact@v4
        with:
          name: valid-${{ matrix.shard }}
          path: valid_${{ matrix.shard }}.csv
          retention-days: 1

  # ---------- FASE 3: unir, escribir Sheets, podar y commitear ----------
  merge:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread oauth2client Pillow
      - name: Traer imagenes nuevas a images/
        uses: actions/download-artifact@v4
        with:
          pattern: new-*
          path: images
          merge-multiple: true
      - name: Traer CSVs validos
        uses: actions/download-artifact@v4
        with:
          pattern: valid-*
          path: valid_parts
          merge-multiple: true
      - name: Merge + Sheets + poda
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python main.py merge --valid-dir valid_parts --shards ${{ env.SHARDS }}
      - name: Commit y push (un solo pusher)
        run: |
          git config user.name 'GitHub Action Bot'
          git config user.email 'action@github.com'
          git add images/ images_manifest.txt
          git commit -m "Auto-update imagenes feed EFE" || { echo "sin cambios"; exit 0; }
          for intento in 1 2 3 4 5; do
            git fetch origin main
            # Nuestra salida es la autoritativa: ante conflicto, gana lo nuestro
            git merge -X ours origin/main -m "merge auto" || true
            if git push origin HEAD:main; then
              echo "push OK"
              exit 0
            fi
            echo "push falló (main se movió); reintento $intento..."
            sleep $((RANDOM % 8 + 4))
          done
          echo "No se pudo pushear tras varios intentos"
          exit 1
